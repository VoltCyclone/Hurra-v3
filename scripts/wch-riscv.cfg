# WCH-LinkE OpenOCD config for the CH32H417 (QingKe RISC-V), used by `make flash`
# when flashing through WCH's *forked* OpenOCD (the `wch-openocd` binary).
#
# Source: openwch/openocd_wch bin/wch-riscv.cfg (verbatim). Requires the WCH
# fork — mainline OpenOCD 0.12 has NO `wlinke` adapter driver / `sdi` transport
# and will error on the first line. Mainline users should use the `wlink` Rust
# tool path instead (see the Makefile `flash` target, which auto-detects).
#
# Address note: this programs the flash bank at 0x00000000 (the WCH-OpenOCD
# convention). That is the SAME physical flash as the 0x08000000 alias the
# `wlink` tool and the StdPeriph FLASH_BASE use — our linker lays V3F at
# 0x00000000 and V5F at 0x00010000, and Merge.bin is built to that layout, so
# programming the merged image at bank base 0 is correct.

#interface wlink
adapter driver wlinke
adapter speed 6000
transport select sdi

wlink_set_address 0x00000000
set _CHIPNAME wch_riscv
sdi newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x00001

set _TARGETNAME $_CHIPNAME.cpu

target create $_TARGETNAME.0 wch_riscv -chain-position $_TARGETNAME
$_TARGETNAME.0 configure  -work-area-phys 0x20000000 -work-area-size 10000 -work-area-backup 1
set _FLASHNAME $_CHIPNAME.flash

flash bank $_FLASHNAME wch_riscv 0x00000000 0 0 0 $_TARGETNAME.0

echo "Ready for Remote Connections"
